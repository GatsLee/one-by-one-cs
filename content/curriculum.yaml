# CS + AI/ML 커리큘럼 — 레벨별 구조
# "학습 자료" 모드에서 curriculum/ 폴더의 마크다운 파일을 직접 로드
# "AI 튜터" 모드에서 아래 topics를 LLM 프롬프트 컨텍스트로 사용

topics:
  자료구조:
    - 배열과 리스트
    - 스택과 큐
    - 해시 테이블
    - 트리 (이진트리, BST, AVL)
    - 힙과 우선순위 큐
    - 그래프
    - 정렬 알고리즘
    - 동적 프로그래밍
    - 탐욕 알고리즘
    - 문자열 알고리즘과 트라이

  운영체제:
    - 프로세스와 스레드
    - 스케줄링 알고리즘
    - 메모리 관리 (가상 메모리, 페이징)
    - 동기화 (뮤텍스, 세마포어)
    - 데드락
    - 파일 시스템
    - 입출력 시스템

  네트워크:
    - OSI 7계층 / TCP/IP
    - HTTP/HTTPS
    - TCP vs UDP
    - DNS
    - WebSocket / gRPC / HTTP/2
    - 네트워크 보안 (TLS, JWT, OAuth, CORS)
    - 네트워크 계층과 라우팅
    - 링크 계층과 스위칭

  데이터베이스:
    - 관계형 DB와 SQL
    - 정규화
    - 인덱싱과 최적화
    - 트랜잭션과 ACID
    - NoSQL
    - ORM 패턴
    - ER 모델링
    - 쿼리 처리와 최적화
    - 복구와 복제

  시스템설계:
    - 확장성과 캐싱
    - 로드 밸런싱과 API 설계
    - CAP 정리와 합의 알고리즘
    - 메시지 큐와 마이크로서비스
    - 데이터베이스 설계
    - 실전 설계 (URL 단축기, 채팅, 뉴스피드)

  AI/ML:
    - ML 기초 (회귀, 분류, 평가 지표)
    - 신경망과 딥러닝 (MLP, CNN, RNN/LSTM)
    - NLP와 트랜스포머 (임베딩, Attention, BERT/GPT)
    - LLM 핵심 기술 (LoRA, RLHF, RAG, 추론 최적화)

  인프라/DevOps:
    - 리눅스와 셸
    - Docker와 컨테이너
    - CI/CD (GitHub Actions)
    - 클라우드와 쿠버네티스
    - 모니터링과 옵저버빌리티
    - IaC와 GitOps

  AI에이전트:
    - 에이전트 기초 (ReAct, Tool Use, 메모리)
    - 오케스트레이션 (LangChain, LangGraph, 멀티에이전트)
    - MCP와 에이전트 배포

  소프트웨어아키텍처:
    - 디자인 패턴과 SOLID 원칙
    - 생성 패턴과 구조 패턴
    - 행위 패턴
    - 아키텍처 패턴
    - 클린 아키텍처

  디버깅:
    - 에러 메시지 읽기
    - 디버깅 전략
    - 개발자 도구 활용
    - 자주 발생하는 버그 패턴
    - AI와 함께 디버깅하기

  Git/버전관리:
    - Git 기초
    - 브랜치와 머지
    - 협업 워크플로우
    - 되돌리기와 복구

  테스팅:
    - 테스트가 필요한 이유
    - 단위 테스트
    - 통합 테스트와 E2E
    - TDD와 테스트 패턴

# 레벨별 커리큘럼 로드맵 (curriculum/ 디렉터리 구조)
levels:
  level-1:
    name: "기초 (Beginner)"
    description: "자료구조/네트워크/DB 입문"
    documents: 12
    hours: 20

  level-2:
    name: "중급 (Intermediate)"
    description: "CS 면접 핵심: OS, 네트워크 심화, DB, 알고리즘"
    documents: 16
    hours: 32

  level-3:
    name: "고급 (Advanced)"
    description: "시스템 설계, AI/ML 기초, 인프라"
    documents: 16
    hours: 34

  level-4:
    name: "심화 (Senior)"
    description: "LLM, AI 에이전트, 아키텍처, 클린 아키텍처"
    documents: 13
    hours: 26
